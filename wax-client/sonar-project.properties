# SonarCloud Configuration
sonar.projectKey=JuanDiego-sc_wax-client
sonar.organization=juandiego-sc

sonar.projectName=WAX Client
sonar.projectVersion=0.0.0

# Source configuration
sonar.sources=src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**

# Coverage exclusions — medimos código con lógica (componentes, hooks, utils, api).
# Excluimos solo lo no testeable: tipos puros, configs estáticas, routing, entry, barrels.
# Sonar sigue analizando estos archivos para code smells y bugs.
sonar.coverage.exclusions=src/main.tsx,src/**/*.d.ts,src/types/**,src/config/**,src/routes/routePaths.ts,src/routes/router.tsx,src/services/queryClient.ts,src/lib/queryKeys.ts,src/lib/types/**,src/**/types/**,src/**/index.ts

# TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
